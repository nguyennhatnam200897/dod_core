<div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 mb-4 transition-transform hover:-translate-y-1 hover:shadow-md"
     x-show="isVisible"
     x-transform-y="offsetY"
     style="transform: translateY(var(--y, -9999px)); will-change: transform;">
     
    <div class="flex justify-between items-start mb-3">
        <h3 class="text-lg font-bold text-gray-800 line-clamp-1" x-text="shopName">Tên Shop</h3>
        
        <div class="px-3 py-1 rounded-full text-sm font-bold border"
             x-class:bg-green-100="isTrusted" x-class:text-green-700="isTrusted" x-class:border-green-200="isTrusted"
             x-class:bg-red-100="isWarning" x-class:text-red-700="isWarning" x-class:border-red-200="isWarning"
             x-class:bg-gray-100="isNormal" x-class:text-gray-700="isNormal" x-class:border-gray-200="isNormal">
            <span x-text="trustScoreText">0.0</span> ⭐
        </div>
    </div>

    <div class="text-gray-500 text-sm mb-4">
        <span class="font-semibold text-gray-700" x-text="totalReviewsText">0</span> lượt đánh giá
        <span class="mx-2">|</span>
        <span class="text-red-500 font-medium" x-show="hasManyBadReviews">⚠️ Cảnh báo: Nhiều 1 sao</span>
        <span class="text-green-500 font-medium" x-show="isTopTier">🏆 Top Seller</span>
    </div>

    <div class="flex items-center gap-3 mb-4">
        <span class="text-xs text-gray-400 w-12">Hài lòng</span>
        <div class="flex-1 bg-gray-200 rounded-full h-2 overflow-hidden">
            <div class="bg-primary h-2 rounded-full transition-all" x-style:width="goodRatioText" unit="%"></div>
        </div>
        <span class="text-xs font-bold text-primary w-8 text-right"><span x-text="goodRatioText">0</span>%</span>
    </div>

    <button class="w-full py-2.5 bg-gray-50 hover:bg-gray-100 text-primary font-semibold rounded-lg border border-gray-200 transition-colors cursor-pointer"
            x-on:click="viewDetailsAction">
        Đọc phân tích chuyên sâu
    </button>
</div>
