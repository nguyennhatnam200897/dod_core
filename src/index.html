<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Siêu Thị 100.000 Món - DOD Engine</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        body { font-family: system-ui; background: #f1f5f9; padding: 20px; margin: 0; display: flex; flex-direction: column; gap: 20px; height: 100vh; box-sizing: border-box; }
        
        /* 🌟 THANH NAVBAR CHUNG */
        .top-nav { background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .top-nav a { text-decoration: none; font-weight: bold; padding: 10px 20px; border-radius: 8px; transition: 0.2s; }
        .top-nav a:hover { background: #f1f5f9; }
        .nav-home { color: #3b82f6; }
        .nav-cart { color: #10b981; display: flex; align-items: center; gap: 8px; }
        .cart-badge-global { background: #ef4444; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; }

        /* CỘT TRÁI: KHUNG CUỘN ẢO */
        .main-col { flex: 1; display: flex; flex-direction: column; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; height: 100%; }
        .header { padding: 20px; background: #1e293b; color: white; }
        #product-grid { flex: 1; overflow-y: auto; position: relative; }
        
        /* THIẾT KẾ 1 SẢN PHẨM */
        .virtual-wrapper { 
            position: absolute; left: 0; width: 100%; height: 140px; 
            box-sizing: border-box; padding: 15px 20px; 
            border-bottom: 1px solid #e2e8f0; 
            contain: strict; 
            will-change: transform;
            transform: translateY(var(--y, 0px));
        }
        .product-card { display: flex; justify-content: space-between; align-items: center; height: 100%; }
        .badge-out { display: none; background: #ef4444; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-bottom: 5px; width: fit-content; }
        .badge-low { display: none; background: #f59e0b; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-bottom: 5px; width: fit-content; }
        .btn-buy { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-buy:active { transform: scale(0.95); }
        .btn-disabled { background: #cbd5e1 !important; cursor: not-allowed !important; color: #94a3b8 !important; transform: none !important; }
        .btn-tag { padding: 8px 15px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-tag:active { transform: scale(0.95); }

        /* CỘT PHẢI: GIỎ HÀNG THÔNG MINH */
        .sidebar { width: 100%; max-width: 500px; margin: 0 auto; background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; }
        .summary-row { display: flex; justify-content: space-between; font-size: 16px; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; }
        .promo-box { display: flex; gap: 10px; margin-top: 10px; }
        .promo-box input { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; }
        
        /* MODAL & PARTICLES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.7); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-box { background: white; padding: 30px; border-radius: 16px; width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); transform: scale(0.95); animation: pop 0.2s forwards ease-out; }
        @keyframes pop { to { transform: scale(1); } }
        .btn-close-modal { padding: 12px 30px; background: #64748b; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; transition: 0.2s; }
        .btn-close-modal:hover { background: #475569; }
        .particle { position: fixed; top: 0; left: 0; width: 60px; height: 60px; border-radius: 50%; pointer-events: none; z-index: 9999; opacity: 0; transform: translate(-100px, -100px) scale(0.1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); will-change: transform, opacity; }
        .particle.flying { transition: transform 0.6s cubic-bezier(0.5, -0.5, 0.2, 1), opacity 0.6s ease-in; }
    </style>
</head>
<body>

    <header class="top-nav">
        <div style="font-size: 24px; font-weight: 900; color: #0f172a;">🚀 DOD E-Commerce</div>
        <nav>
            <a href="/" data-link class="nav-home">Cửa hàng</a>
            <a href="/cart" data-link class="nav-cart">
                Giỏ hàng <span class="cart-badge-global" id="global-cart-qty">0</span>
            </a>
        </nav>
    </header>

    <main id="app-root" style="flex: 1; min-height: 0; position: relative; display: flex;"></main>

    <div id="modal-container"></div>

    <template id="modal-tpl">
        <div id="alert-modal" class="modal-overlay">
            <div class="modal-box">
                <div style="font-size: 50px; margin-bottom: 10px;">⚠️</div>
                <h2 style="margin: 0 0 10px 0; color: #0f172a;">Rất tiếc!</h2>
                <p id="modal-msg" style="color: #475569; font-size: 16px; margin-bottom: 20px;">Sản phẩm đã đạt giới hạn tồn kho.</p>
                <button class="btn-close-modal">Đã hiểu</button>
            </div>
        </div>
    </template>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
